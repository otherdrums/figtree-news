<!DOCTYPE html>
<html lang="en">
<head>

  <title>{% block title %}figtree-news{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

    <div class="container">
      <div class="logo">
        <a href="/"><strong>figtree-news</strong></a>
      </div>
      <nav class="nav">
        <ul>
          <li><a href="/">Front page</a></li>
          <li><a href="/lineage">Lineage</a></li>
          <li><a href="/api/sources">Sources (JSON)</a></li>
        </ul>
      </nav>
    </div>
